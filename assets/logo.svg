<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- Flower pattern — layered translucent ellipses -->
  <g transform="translate(300, 140)">
    <!-- Outer ring of petals (large, lighter) -->
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(0)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(36)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(72)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(108)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(144)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(180)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(216)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(252)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(288)"/>
    <ellipse cx="0" cy="-52" rx="48" ry="78" fill="#FFC3A1" opacity="0.35" transform="rotate(324)"/>

    <!-- Middle ring (medium, warmer) -->
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(0)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(36)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(72)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(108)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(144)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(180)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(216)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(252)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(288)"/>
    <ellipse cx="0" cy="-38" rx="36" ry="62" fill="#F0997D" opacity="0.35" transform="rotate(324)"/>

    <!-- Inner ring (small, deepest color) -->
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(0)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(36)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(72)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(108)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(144)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(180)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(216)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(252)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(288)"/>
    <ellipse cx="0" cy="-24" rx="22" ry="44" fill="#D3756B" opacity="0.4" transform="rotate(324)"/>

    <!-- Core (darkest) -->
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(0)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(36)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(72)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(108)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(144)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(180)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(216)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(252)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(288)"/>
    <ellipse cx="0" cy="-12" rx="10" ry="24" fill="#A75D5D" opacity="0.45" transform="rotate(324)"/>
  </g>

  <!-- Title -->
  <text x="300" y="340" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="68" font-weight="800" fill="#8C5A3C" letter-spacing="-1">The Tesseract</text>
</svg>
