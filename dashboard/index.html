<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tesseract — Agent Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><g transform='translate(32,32)'><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(0)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(36)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(72)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(108)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(144)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(180)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(216)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(252)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(288)'/><ellipse cx='0' cy='-12' rx='11' ry='18' fill='%23FFC3A1' opacity='.35' transform='rotate(324)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(0)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(36)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(72)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(108)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(144)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(180)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(216)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(252)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(288)'/><ellipse cx='0' cy='-7' rx='6' ry='12' fill='%23D3756B' opacity='.45' transform='rotate(324)'/></g></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--terracotta:#A75D5D;--salmon:#D3756B;--peach:#F0997D;--sand:#FFC3A1;--cream:#FEFFDE;--mint:#DDFFBC;--sage:#91C788;--forest:#52734D;--red:#FF7E67;--bg-base:#1a1612;--bg-card:#241f1a;--bg-input:#2e2722;--bg-hover:#38302a;--border:#3d342c;--border-light:#4d4238;--text-primary:#FEFFDE;--text-secondary:#FFC3A1;--text-muted:#A89080;--text-dim:#7a6b5e;--text-ghost:#4d4238}
body{background:var(--bg-base);color:var(--text-primary);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;line-height:1.5}
.mono{font-family:'JetBrains Mono',monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 6px 2px currentColor}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}

.shell{max-width:1320px;margin:0 auto;padding:28px 24px}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.layout{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}
.main{display:flex;flex-direction:column;gap:14px}
.sidebar{display:flex;flex-direction:column;gap:12px}
.header h1{font-family:'Playfair Display',serif;font-size:34px;font-weight:800;letter-spacing:-.02em;color:#FFCE99}
.header p{font-size:13px;color:var(--text-muted);margin-top:2px}

/* TOKEN TOP */
.tok-wrap{position:relative}
.tok-btn{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:7px 14px;cursor:pointer}
.tok-btn:hover{border-color:var(--border-light)}
.tok-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--sand)}
.tok-l{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
.tok-pop{position:absolute;top:100%;right:0;margin-top:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;width:250px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.tok-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.tok-row .l{color:var(--text-muted)}.tok-row .v{font-family:'JetBrains Mono',monospace;color:var(--text-primary);font-weight:600}
.tok-auto{font-size:10px;color:var(--sage);display:flex;align-items:center;gap:4px;margin-top:6px}
.tok-auto .dot{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:pulse 2s infinite}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat:hover{border-color:var(--border-light)}
.stat-v{font-size:22px;font-weight:700}
.stat-l{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;animation:fadeIn .3s ease}
.card-t{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* AGENTS */
.ag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ag-card{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;background:var(--bg-input);border:1px solid var(--border)}
.ag-card:hover{border-color:var(--border-light)}
.ag-icon{font-size:18px}.ag-nm{font-size:11px;font-weight:700}.ag-rl{font-size:9px;color:var(--text-muted)}
.ag-light{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0}
.ag-light.on{animation:blink 1.5s infinite}.ag-light.off{opacity:.2}

/* PLANS — expandable */
.plan{border-radius:10px;background:var(--bg-input);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.plan:last-child{margin-bottom:0}.plan:hover{border-color:var(--border-light)}
.plan-top{padding:12px;cursor:pointer;user-select:none}
.plan-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.plan-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.plan-nm{font-size:13px;font-weight:700;flex:1;min-width:0}
.plan-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:9999px}
.plan-meta{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:3px}
.plan-ov{font-size:11px;color:var(--text-muted);margin-top:5px;line-height:1.4}
.plan-bars{display:flex;gap:10px;margin-top:6px;font-size:10px;color:var(--text-dim)}
.pb{height:3px;background:var(--bg-base);border-radius:2px;overflow:hidden;margin-top:3px}
.pf{height:100%;border-radius:2px}
.plan-expand{padding:0 12px 14px;border-top:1px solid var(--border);animation:fadeIn .2s ease}
.plan-expand-inner{padding-top:12px}
.plan-section{margin-bottom:10px}
.plan-sec-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.plan-task{display:flex;align-items:flex-start;gap:7px;padding:5px 8px;border-radius:6px;font-size:11px;margin-bottom:2px}
.plan-task.done{color:var(--text-dim);text-decoration:line-through}
.plan-task.todo{color:var(--text-secondary)}
.plan-task-agent{font-size:9px;font-weight:600;margin-left:auto;flex-shrink:0;white-space:nowrap}
.plan-empty{text-align:center;padding:16px;color:var(--text-dim);font-size:12px}
.shim{height:40px;background:linear-gradient(90deg,var(--bg-input) 25%,var(--bg-hover) 50%,var(--bg-input) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;margin-bottom:6px}
.server-warn{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--sand)}

/* SIDEBAR WIDGETS */
.spark-row{display:flex;align-items:flex-end;gap:2px;height:44px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-width:0;position:relative;cursor:default}
.spark-bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);font-size:9px;padding:2px 5px;border-radius:3px;white-space:nowrap;font-family:'JetBrains Mono',monospace;z-index:10}
.spark-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--text-ghost);margin-top:3px;font-family:'JetBrains Mono',monospace}

/* Pipeline — compact */
.pipe{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.pipe-col{text-align:center;overflow:hidden}
.pipe-lbl{font-size:7px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.02em;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipe-ct{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-bottom:3px}
.pipe-item{font-size:8px;color:var(--text-muted);background:var(--bg-input);border-radius:3px;padding:1px 3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* GitHub heatmap */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:3px;position:relative;cursor:default}
.hm-cell:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);font-size:9px;padding:2px 5px;border-radius:3px;white-space:nowrap;font-family:'JetBrains Mono',monospace;z-index:10}
.hm-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.hm-labels span{font-size:8px;color:var(--text-ghost);text-align:center;font-family:'JetBrains Mono',monospace}
.gh-commit{display:flex;gap:5px;padding:3px 0;border-bottom:1px solid var(--border);font-size:10px}
.gh-commit:last-child{border-bottom:none}
.gh-repo{color:var(--peach);font-weight:600;flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gh-msg{flex:1;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gh-list{max-height:140px;overflow-y:auto;margin-top:6px}

/* Activity */
.act-list{max-height:200px;overflow-y:auto}
.act-item{display:flex;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.act-item:last-child{border-bottom:none}
.act-msg{flex:1;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-time{font-size:9px;color:var(--text-ghost);font-family:'JetBrains Mono',monospace;flex-shrink:0}

.no-data{text-align:center;padding:12px;color:var(--text-dim);font-size:11px}
.footer{text-align:center;margin-top:28px;padding-top:14px;border-top:1px solid var(--border);font-size:10px;color:var(--text-ghost);grid-column:1/-1}

@media(max-width:960px){.layout{grid-template-columns:1fr}.sidebar{order:-1}}
@media(max-width:480px){.stats{grid-template-columns:1fr}.ag-grid{grid-template-columns:1fr}.header h1{font-size:26px}}
</style>
</head>
<body>
<div class="shell" id="app"></div>
<script>
const AG=[
  {id:"odysseus",name:"Odysseus",role:"Architect",icon:"\u{1FAE9}",hex:"#F0997D"},
  {id:"rocky",name:"Rocky",role:"Implementer",icon:"\u{1FAA8}",hex:"#FFC3A1"},
  {id:"marvin",name:"Marvin",role:"QA Engineer",icon:"\u{1F916}",hex:"#A75D5D"},
  {id:"babel",name:"Babel",role:"Tech Writer",icon:"\u{1F420}",hex:"#91C788"},
  {id:"muaddib",name:"Muad'Dib",role:"PR Crafter",icon:"\u{1F9FF}",hex:"#D3756B"},
  {id:"ratatouille",name:"Ratatouille",role:"Triager",icon:"\u{1F42D}",hex:"#DDFFBC"},
];
const ST=[{k:"Draft",c:"#A89080"},{k:"In Review",c:"#FFC3A1"},{k:"Approved",c:"#F0997D"},{k:"In Progress",c:"#91C788"},{k:"Complete",c:"#52734D"}];
function sc(s){return(ST.find(x=>x.k===s)||ST[0]).c}
const TK="tesseract_tokens_v2",HK="tesseract_history_v2";
function ls(k,d){try{const r=localStorage.getItem(k);if(r)return JSON.parse(r)}catch(e){}return d}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

let tokens=ls(TK,{input:0,output:0,total:0,auto:false}),tokenHistory=ls(HK,[]),
    plans=[],plansOk=false,plansErr=null,ghData={events:[],heatmap:[]},activities=[],memoryData=[],
    expandedPlans=new Set(),tokOpen=false,serverUp=null;

function ga(id){return AG.find(a=>a.id===id)}
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":String(n)}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

async function fetchJson(url){const r=await fetch(url);if(!r.ok)throw new Error(`${r.status}`);const ct=r.headers.get("content-type")||"";if(!ct.includes("json"))throw new Error("Not running");return r.json()}

async function fetchAll(){
  let changed=false;
  try{
    const newPlans=await fetchJson("/api/plans");
    if(JSON.stringify(newPlans)!==JSON.stringify(plans)){plans=newPlans;changed=true}
    plansOk=true;plansErr=null;serverUp=true;
  }catch(e){
    if(plansErr!==e.message)changed=true;
    plansErr=e.message;plansOk=true;serverUp=false;
  }
  if(serverUp){
    try{const d=await fetchJson("/api/github");if(JSON.stringify(d)!==JSON.stringify(ghData)){ghData=d;changed=true}}catch(e){ghData={events:[],heatmap:[]}}
    try{const d=await fetchJson("/api/tokens");if(d.auto){const newHist=d.daily||[];if(JSON.stringify(newHist)!==JSON.stringify(tokenHistory)){tokenHistory=newHist;tokens={input:d.total_input||0,output:d.total_output||0,total:d.total||0,auto:true};ss(TK,tokens);ss(HK,tokenHistory);changed=true}}}catch(e){}
    try{const d=await fetchJson("/api/activity");if(JSON.stringify(d)!==JSON.stringify(activities)){activities=d;changed=true}}catch(e){activities=[]}
    try{const d=await fetchJson("/api/memory");if(JSON.stringify(d)!==JSON.stringify(memoryData)){memoryData=d;changed=true}}catch(e){memoryData=[]}
  }
  if(changed)render();
}

function inferSts(){const s={};AG.forEach(a=>s[a.id]="idle");for(const p of plans){if(p.status==="Draft"||p.status==="In Review")s.odysseus="active";if(p.status==="Approved"||p.status==="In Progress"){s.rocky="active";s.marvin="active";s.babel="active"}if(p.status==="In Progress"&&p.acceptance_done===p.acceptance_total&&p.acceptance_total>0)s.muaddib="active"}return s}

document.addEventListener("click",e=>{if(!e.target.closest(".tok-wrap")&&tokOpen){tokOpen=false;render()}});

// ── SIDEBAR ──
function wTokens(){
  const hist=tokenHistory.slice(-14);const isAuto=tokens.auto;
  if(!hist.length)return`<div class="card"><div class="card-t">\u{1F4CA} Token Usage</div><div class="no-data">${isAuto?"No sessions in 14 days":"Scanning ~/.claude/ ..."}</div></div>`;
  const max=Math.max(...hist.map(h=>h.total),1);
  const bars=hist.map(h=>`<div class="spark-bar" style="height:${Math.max(3,Math.round(h.total/max*100))}%;background:var(--peach)" data-tip="${h.day||h.date}: ${fmt(h.total)}"></div>`).join("");
  return`<div class="card"><div class="card-t">\u{1F4CA} Token Usage</div><div class="spark-row">${bars}</div><div class="spark-labels"><span>${hist[0]?.day||""}</span><span>${hist[hist.length-1]?.day||""}</span></div>${isAuto?`<div class="tok-auto"><span class="dot"></span>Auto-scanned from Claude Code</div>`:""}</div>`;
}

function wPipeline(){
  const cols=ST.map(s=>{const items=plans.filter(p=>p.status===s.k);
    const names=items.slice(0,3).map(p=>`<div class="pipe-item" title="${esc(p.name)}">${esc((p.name||p.slug).slice(0,18))}</div>`).join("");
    return`<div class="pipe-col"><div class="pipe-lbl" style="color:${s.c}">${s.k.replace("In ","")}</div><div class="pipe-ct" style="color:${s.c}">${items.length}</div>${names}</div>`;
  }).join("");
  return`<div class="card"><div class="card-t">\u{1F5C2}\u{FE0F} Pipeline</div><div class="pipe">${cols}</div></div>`;
}

function wGitHub(){
  const hm=ghData.heatmap||[];const events=ghData.events||[];const user=ghData.username||"";const err=ghData.error||"";
  if(err&&!events.length)return`<div class="card"><div class="card-t">\u{1F4C8} GitHub</div><div class="no-data">${esc(err)}</div></div>`;
  let hmHtml="";
  if(hm.length){
    const realCells=hm.filter(h=>h.count>=0);
    const max=Math.max(...realCells.map(h=>h.count),1);
    const days=["Mo","Tu","We","Th","Fr","Sa","Su"];
    const labels=days.map(d=>`<span>${d}</span>`).join("");
    hmHtml=`<div class="hm-labels">${labels}</div><div class="heatmap">${hm.map(h=>{
      if(h.count<0)return`<div class="hm-cell" style="background:transparent"></div>`;
      const intensity=h.count===0?0:Math.max(.25,h.count/max);
      const bg=h.count===0?"var(--bg-input)":`rgba(145,199,136,${intensity})`;
      return`<div class="hm-cell" style="background:${bg}" data-tip="${h.date}: ${h.count}"></div>`;
    }).join("")}</div>`;
  }
  const commitList=events.slice(0,6).map(e=>{
    const repo=(e.repo||"").split("/").pop();
    return`<div class="gh-commit"><span class="gh-repo" title="${esc(e.repo)}">${esc(repo)}</span><span class="gh-msg">${esc(e.message)}</span></div>`;
  }).join("");
  return`<div class="card"><div class="card-t">\u{1F4C8} GitHub${user?` \u00B7 <span style="color:var(--peach);font-weight:400">${esc(user)}</span>`:""}</div>${hmHtml}${commitList?`<div class="gh-list">${commitList}</div>`:""}</div>`;
}

function wActivity(){
  if(!activities.length)return`<div class="card"><div class="card-t">\u{1F4DD} Activity</div><div class="no-data">No recent activity</div></div>`;
  const items=activities.slice(0,10).map(a=>{const ag=ga(a.agent);
    return`<div class="act-item"><span style="font-size:13px">${ag?ag.icon:"\u2022"}</span><span class="act-msg">${esc(a.message)}</span><span class="act-time">${a.date?a.date.slice(5):""}</span></div>`;
  }).join("");
  return`<div class="card"><div class="card-t">\u{1F4DD} Activity</div><div class="act-list">${items}</div></div>`;
}

function wMemory(){
  if(!memoryData.length)return"<div class=\"card\"><div class=\"card-t\">\u{1F9E0} Agent Memory</div><div class=\"no-data\">No memory files found</div></div>";
  var totalEntries=memoryData.reduce(function(a,m){return a+m.entries},0);
  var maxE=Math.max.apply(null,memoryData.map(function(x){return x.entries}).concat([1]));
  var items=memoryData.map(function(m){
    var ag=ga(m.agent);if(!ag)return"";
    var bw=totalEntries?Math.max(4,Math.round(m.entries/maxE*100)):0;
    var clr=m.entries>0?"var(--text-secondary)":"var(--text-ghost)";
    return "<div style=\"display:flex;align-items:center;gap:8px;padding:4px 0\">"+
      "<span style=\"font-size:14px\">"+ag.icon+"</span>"+
      "<span style=\"font-size:11px;font-weight:600;color:"+ag.hex+";min-width:70px\">"+ag.name+"</span>"+
      "<div style=\"flex:1;height:6px;background:var(--bg-base);border-radius:3px;overflow:hidden\">"+
      "<div style=\"width:"+bw+"%;height:100%;background:"+ag.hex+";border-radius:3px;opacity:.7\"></div></div>"+
      "<span class=\"mono\" style=\"font-size:10px;color:"+clr+";min-width:20px;text-align:right\">"+m.entries+"</span></div>";
  }).join("");
  return "<div class=\"card\"><div class=\"card-t\">\u{1F9E0} Agent Memory <span style=\"color:var(--text-ghost);font-weight:400;margin-left:auto\">"+totalEntries+" entries</span></div>"+items+"</div>";
}

// ── MAIN ──
function rTokenTop(){
  const popup=tokOpen?`<div class="tok-pop">
    <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:6px">Token Usage</div>
    <div class="tok-row"><span class="l">Input</span><span class="v">${fmt(tokens.input)}</span></div>
    <div class="tok-row"><span class="l">Output</span><span class="v">${fmt(tokens.output)}</span></div>
    <div class="tok-row"><span class="l">Total</span><span class="v" style="color:var(--peach)">${fmt(tokens.total)}</span></div>
    ${tokens.auto?`<div class="tok-auto"><span class="dot"></span>Auto-scanned from Claude Code</div>`:""}</div>`:"";
  return`<div class="tok-wrap"><div class="tok-btn" onclick="tokOpen=!tokOpen;render()"><span style="font-size:13px;color:var(--peach)">\u{1F4CA}</span><span class="tok-v">${fmt(tokens.total)}</span><span class="tok-l">tokens</span></div>${popup}</div>`;
}

function rAgents(){
  const sts=inferSts();
  return`<div class="card"><div class="card-t">Agents</div><div class="ag-grid">${AG.map(a=>{
    const on=sts[a.id]==="active";
    return`<div class="ag-card"><span class="ag-icon">${a.icon}</span><div><div class="ag-nm" style="color:${a.hex}">${a.name}</div><div class="ag-rl">${a.role}</div></div><div class="ag-light ${on?"on":"off"}" style="color:${a.hex};background:${a.hex}"></div></div>`;
  }).join("")}</div></div>`;
}

function rPlans(){
  let c="";
  if(!plansOk)c=`<div class="shim"></div>`;
  else if(plansErr)c=`<div class="plan-empty">\u26A0\uFE0F Could not load plans<br><span style="font-size:10px;color:var(--text-ghost)">Run <span class="mono" style="color:var(--peach)">make stop && make dashboard</span></span></div>`;
  else if(!plans.length)c=`<div class="plan-empty">\u{1FAE9} No plans yet. <span class="mono" style="color:var(--peach)">make new-plan NAME=my-feature</span></div>`;
  else c=plans.map(p=>{
    const col=sc(p.status),rP=p.requirements_total?Math.round(p.requirements_done/p.requirements_total*100):0,aP=p.acceptance_total?Math.round(p.acceptance_done/p.acceptance_total*100):0;
    const isExp=expandedPlans.has(p.slug);
    const chevron=isExp?"\u25BC":"\u25B6";

    // Expanded: show checklist grouped by section with agent attribution
    let expandHtml="";
    if(isExp&&p.checklist&&p.checklist.length){
      const sections={};
      p.checklist.forEach(t=>{if(!sections[t.section])sections[t.section]=[];sections[t.section].push(t)});
      expandHtml=`<div class="plan-expand"><div class="plan-expand-inner">${Object.entries(sections).map(([sec,tasks])=>{
        const done=tasks.filter(t=>t.done).length;
        return`<div class="plan-section"><div class="plan-sec-title">${sec} <span style="color:var(--text-ghost);font-weight:400">${done}/${tasks.length}</span></div>${tasks.map(t=>{
          const ag=ga(t.agent);
          return`<div class="plan-task ${t.done?"done":"todo"}"><span>${t.done?"\u2705":"\u2B1C"}</span><span style="flex:1">${esc(t.text.slice(0,80))}${t.text.length>80?"\u2026":""}</span>${ag?`<span class="plan-task-agent" style="color:${ag.hex}">${ag.icon}</span>`:""}</div>`;
        }).join("")}</div>`;
      }).join("")}</div></div>`;
    } else if(isExp){
      expandHtml=`<div class="plan-expand"><div class="plan-expand-inner"><div class="no-data">No checklist items in this plan yet</div></div></div>`;
    }

    return`<div class="plan"><div class="plan-top" onclick="togglePlan('${p.slug}')">
      <div class="plan-hdr"><div class="plan-dot" style="background:${col}"></div><span class="plan-nm">${chevron} ${esc(p.name||p.slug)}</span><span class="plan-badge" style="background:${col}22;color:${col}">${p.status}</span></div>
      <div class="plan-meta">${p.slug}.md \u00B7 ${p.created||"?"}</div>
      ${!isExp&&p.overview?`<div class="plan-ov">${esc(p.overview.slice(0,160))}${p.overview.length>160?"\u2026":""}</div>`:""}
      <div class="plan-bars">${p.requirements_total?`<div style="flex:1">Req ${p.requirements_done}/${p.requirements_total}<div class="pb"><div class="pf" style="width:${rP}%;background:var(--peach)"></div></div></div>`:""}${p.acceptance_total?`<div style="flex:1">AC ${p.acceptance_done}/${p.acceptance_total}<div class="pb"><div class="pf" style="width:${aP}%;background:var(--sage)"></div></div></div>`:""}</div>
    </div>${expandHtml}</div>`;
  }).join("");
  return`<div class="card"><div class="card-t">\u{1FAE9} Odysseus \u2014 Plans</div>${c}</div>`;
}

// ── RENDER ──
function render(){
  const ap=plans.filter(p=>p.status!=="Complete").length;
  const totalChecks=plans.reduce((a,p)=>(a+(p.checklist||[]).length),0);
  const doneChecks=plans.reduce((a,p)=>(a+(p.checklist||[]).filter(t=>t.done).length),0);
  const pct=totalChecks?Math.round(doneChecks/totalChecks*100):0;

  const warn=serverUp===false?`<div class="server-warn">\u26A0\uFE0F Server not running. <span class="mono" style="color:var(--peach)">make dashboard</span></div>`:"";

  document.getElementById("app").innerHTML=`
    <div class="top-bar"><div class="header"><div style="display:flex;align-items:center;gap:12px"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="42" height="42"><g transform="translate(32,32)"><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(0)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(36)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(72)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(108)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(144)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(180)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(216)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(252)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(288)"/><ellipse cx="0" cy="-12" rx="11" ry="18" fill="#FFC3A1" opacity=".35" transform="rotate(324)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(0)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(36)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(72)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(108)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(144)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(180)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(216)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(252)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(288)"/><ellipse cx="0" cy="-7" rx="6" ry="12" fill="#D3756B" opacity=".45" transform="rotate(324)"/></g></svg><h1>The Tesseract</h1></div><p>Agent orchestration dashboard</p></div>${rTokenTop()}</div>
    ${warn}
    <div class="layout">
      <div class="main">
        <div class="stats">
          <div class="stat"><div class="stat-v mono" style="color:var(--peach)">${ap}</div><div class="stat-l">Active Plans</div></div>
          <div class="stat"><div class="stat-v mono" style="color:var(--sage)">${doneChecks}/${totalChecks}</div><div class="stat-l">Tasks Done</div></div>
          <div class="stat"><div class="stat-v mono" style="color:${pct>=80?"#91C788":"#FFC3A1"}">${pct}%</div><div class="stat-l">Completion</div></div>
        </div>
        ${rAgents()}
        ${rPlans()}
      </div>
      <div class="sidebar">${wTokens()}${wPipeline()}${wMemory()}${wGitHub()}${wActivity()}</div>
    </div>
    <div class="footer">The Tesseract \u00B7 Plans auto-sync from /plans/ \u00B7 Don't Panic</div>`;
}

// ── ACTIONS ──
function togglePlan(slug){expandedPlans.has(slug)?expandedPlans.delete(slug):expandedPlans.add(slug);render()}

render();fetchAll();setInterval(fetchAll,5000);
</script>
</body>
</html>
